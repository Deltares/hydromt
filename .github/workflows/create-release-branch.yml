name: Create release branch (minor/major)

# Creates a long-lived `release/vX.Y` branch off `main` for a major or minor
# release. In a single run it:
#   1. Creates `release/vX.Y` from main and bumps it to X.Y.0 (via
#      `setup-release.sh`: version, changelog header, switcher.json).
#   2. Bumps `main` to X.(Y+1).0.dev0 and adds a fresh `Unreleased`
#      changelog section, so `main` is always one minor ahead.
#
# Release branches are NEVER merged back into `main`. Instead,
# `create-release.yml` opens a `record-release/v…` PR after each full
# release that brings only the changelog and switcher entry to `main`.

on:
  workflow_dispatch:
    inputs:
      bump:
        type: choice
        description: "Is this a Minor or Major release?"
        options:
          - minor
          - major
        default: minor

defaults:
  run:
    shell: bash -l -e {0}

jobs:
  create-release-branch:
    name: Create release branch and PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: NEW_RELEASE
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Compute new version and branch
        id: version
        run: |
          # Main is always one minor (or major) ahead of the latest release,
          # bumped at branch-cut time by this workflow. For a minor release
          # we just *use* main's current version unchanged. For a major
          # release we bump the major and reset minor to 0.
          CURRENT_VERSION=$(bash .github/scripts/get-version.sh \
            | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*$/\1/')
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d'.' -f 1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d'.' -f 2)

          case "${{ inputs.bump }}" in
            minor)
              NEW_MAJOR=$MAJOR
              NEW_MINOR=$MINOR
              ;;
            major)
              NEW_MAJOR=$((MAJOR + 1))
              NEW_MINOR=0
              ;;
          esac

          NEW_VERSION="$NEW_MAJOR.$NEW_MINOR.0"
          RELEASE_BRANCH="release/v$NEW_MAJOR.$NEW_MINOR"

          if git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" >/dev/null; then
            echo "Release branch '$RELEASE_BRANCH' already exists on origin."
            exit 1
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "RELEASE_BRANCH=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create release branch with version bump
        env:
          NEW_VERSION: ${{ steps.version.outputs.NEW_VERSION }}
          RELEASE_BRANCH: ${{ steps.version.outputs.RELEASE_BRANCH }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"

          git checkout -b "$RELEASE_BRANCH"
          git push --set-upstream origin "$RELEASE_BRANCH"

          # Bump version, update changelog & switcher, commit, push.
          bash .github/scripts/setup-release.sh "$NEW_VERSION"

      - name: Bump main to next dev version
        env:
          NEW_VERSION: ${{ steps.version.outputs.NEW_VERSION }}
        run: |
          # Switch back to main and advance it to X.(Y+1).0.dev0 so that
          # main is always one minor ahead of the most recent release family.
          git checkout main

          MAJOR=$(echo "$NEW_VERSION" | cut -d. -f 1)
          MINOR=$(echo "$NEW_VERSION" | cut -d. -f 2)
          NEXT_VERSION="$MAJOR.$((MINOR + 1)).0"

          bash .github/scripts/set-version.sh "${NEXT_VERSION}.dev0"

          # Prepend a fresh Unreleased section to the changelog.
          sed -i "s/^v$NEW_VERSION/Unreleased\n==========\n\nNew\n---\n\nChanged\n-------\n\nFixed\n-----\n\nDeprecated\n----------\n\nRemoved\n-------\n\nv$NEW_VERSION/" docs/changelog.rst

          git add hydromt/__init__.py docs/changelog.rst
          git commit -m "Start ${NEXT_VERSION}.dev0 development cycle"
          git push
