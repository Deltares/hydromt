name: Downstream plugin compatibility

on:
  push:
    tags:
      - "v*"
    branches: [feat/release-test-automation-downstream-plugins]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  downstream:
    name: Test ${{ matrix.plugin.name }} (deps=${{ matrix.with_deps }})
    runs-on: ubuntu-latest
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        with_deps: [false, true]
        plugin:
          - name: hydromt-wflow
            repo: Deltares/hydromt_wflow
            pixi_task: test
            environment: default
          - name: hydromt-sfincs
            repo: Deltares/hydromt_sfincs
            pixi_task: tests
            environment: default
          - name: hydromt-fiat
            repo: Deltares/hydromt_fiat
            pixi_task: test
            environment: default

    steps:
      - name: Checkout hydromt
        uses: actions/checkout@v6

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: "v0.59.0"

      - name: Build hydromt wheel
        run: |
          pixi run python -m pip install --upgrade pip build
          pixi run python -m build --wheel

      - name: Record hydromt dist path
        run: echo "HYDROMT_DIST=$GITHUB_WORKSPACE/dist" >> $GITHUB_ENV

      - name: Checkout plugin
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.plugin.repo }}
          path: plugin
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Solve environment for hydromt candidate (with deps)
        if: matrix.with_deps == true
        working-directory: plugin
        run: |
          wheel_file=$(ls "$HYDROMT_DIST"/hydromt-*.whl)
          pixi add "hydromt@file:$wheel_file" --pypi

      - name: Install plugin env
        working-directory: plugin
        run: |
          pixi install -e ${{ matrix.plugin.environment }}

      - name: Install hydromt candidate (no deps)
        if: matrix.with_deps == false
        working-directory: plugin
        run: |
          pixi run -e ${{ matrix.plugin.environment }} --no-install \
            python -m ensurepip --upgrade
          pixi run -e ${{ matrix.plugin.environment }} --no-install \
            python -m pip install --force-reinstall --no-deps "$HYDROMT_DIST"/hydromt-*.whl

      - name: Echo solved environment
        working-directory: plugin
        run: |
          # what pixi thinks is installed
          echo "pixi list output:"
          pixi list -e ${{ matrix.plugin.environment }} --no-install

          # what python will import
          echo "pip freeze output:"
          pixi run -e ${{ matrix.plugin.environment }} --no-install \
            python -m pip freeze

      - name: Run plugin compatibility tests
        working-directory: plugin
        env:
          PYTEST_ADDOPTS: "-p no:warnings"
        run: |
          pixi run -e ${{ matrix.plugin.environment }} --no-install ${{ matrix.plugin.pixi_task }}

      - name: Failure guidance
        if: failure()
        run: |
          echo ""
          echo "Downstream compatibility failure"
          echo ""
          echo "Plugin: ${{ matrix.plugin.name }}"
          echo "With dependencies: ${{ matrix.with_deps }}"
          echo ""

          if [ "${{ matrix.with_deps }}" = "false" ]; then
            echo "This failure indicates that the new hydromt version is not drop-in compatible with an existing plugin environment."
          else
            echo "This failure indicates that plugin code is not yet compatible with the updated dependencies of the .whl file."
            echo "Or that the version ranges are not setup correctly for either the plugin or core."
          fi

          echo ""
          echo "ACTION: review errors and choose 1 or 2:"
          echo "1. Accept the failure: this failure is expected and is not a problem. Document that this is the case and why!"
          echo "2. Fix the failure: Either in core before making the release, or in the plugin."
          echo ""
          echo "Finally, let the plugin developer (team) know about any errors you encountered!"
          echo "And that a new release of hydromt core is made!"
          echo ""
          echo "For more information, please review the docs:"
          echo "- https://deltares.github.io/hydromt/stable/dev/core_dev/release.html"
          echo "- https://deltares.github.io/hydromt/stable/dev/plugin_dev/testing.html"
