name: Downstream plugin compatibility

on:
  push:
    tags:
      - "v*"
    branches: [feat/release-test-automation-downstream-plugins]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  downstream:
    name: Test ${{ matrix.plugin.name }} (deps=${{ matrix.with_deps }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        plugin:
          - name: hydromt-wflow
            repo: Deltares/hydromt_wflow
            pixi_task: test
            environment: default
          - name: hydromt-sfincs
            repo: Deltares/hydromt_sfincs
            pixi_task: tests
            environment: default
        with_deps: [false, true]

    steps:
      - name: Checkout hydromt
        uses: actions/checkout@v6

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: "v0.59.0"

      - name: Build hydromt wheel
        run: |
          pixi run python -m pip install --upgrade pip build
          pixi run python -m build --wheel

      - name: Record hydromt dist path
        run: echo "HYDROMT_DIST=$GITHUB_WORKSPACE/dist" >> $GITHUB_ENV

      - name: Checkout plugin
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.plugin.repo }}
          path: plugin
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install hydromt candidate (with deps)
        if: matrix.with_deps == true
        working-directory: plugin
        run: |
          pixi install -e ${{ matrix.plugin.environment }}
          pixi run -e ${{ matrix.plugin.environment }} python -m ensurepip --upgrade
          pixi run -e ${{ matrix.plugin.environment }} \
            python -m pip install --force-reinstall "$HYDROMT_DIST"/hydromt-*.whl

      - name: Install hydromt candidate (no deps)
        if: matrix.with_deps == false
        working-directory: plugin
        run: |
          pixi install -e ${{ matrix.plugin.environment }}
          pixi run -e ${{ matrix.plugin.environment }} python -m ensurepip --upgrade
          pixi run -e ${{ matrix.plugin.environment }} \
            python -m pip install --force-reinstall --no-deps "$HYDROMT_DIST"/hydromt-*.whl

      - name: Echo solved environment
        run: |
          # what pixi thinks is installed
          echo "pixi list output:"
          pixi list -e ${{ matrix.plugin.environment }}

          # what python will import
          echo "pip freeze output:"
          pixi run --no-install -e ${{ matrix.plugin.environment }} \
            python -m pip freeze

      - name: Run plugin compatibility tests
        working-directory: plugin
        env:
          PYTEST_ADDOPTS: "-p no:warnings"
        run: |
          pixi run -e ${{ matrix.plugin.environment }} --no-install ${{ matrix.plugin.pixi_task }}

      - name: Failure guidance
        if: failure()
        run: |
          echo ""
          echo "Downstream compatibility failure"
          echo ""
          echo "Plugin: ${{ matrix.plugin.name }}"
          echo "With dependencies: ${{ matrix.with_deps }}"
          echo ""
          if [ "${{ matrix.with_deps }}" = "false" ]; then
            echo "This failure is NON-BLOCKING."
            echo "It indicates that the new hydromt version is not drop-in compatible"
            echo "with an existing plugin environment."
            echo "Action: review and decide on what to do; accept, document, or fix."
          else
            echo "This failure IS A RELEASE BLOCKER."
            echo "Dependency resolution or runtime compatibility is broken."
            echo "Action: must be fixed before release."
          fi
