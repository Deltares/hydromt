name: Update Pixi lockfile and SBOM
permissions:
  contents: write
  pull-requests: write
on:
  schedule:
    # At 03:00 on day 3 of the month
    - cron: "0 3 3 * *"
  # on demand
  workflow_dispatch:
jobs:
  pixi-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: "v0.59.0"
          run-install: false
      - name: Update lockfiles
        run: |
          set -o pipefail
          pixi update --json | pixi exec pixi-diff-to-markdown >> diff.md
      - name: Generate SBOM
        run: |
          set -o pipefail
          pixi run generate-sbom

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.TOKEN_ISSUER_ACTIONS_ID }}
          private-key: ${{ secrets.TOKEN_ISSUER_ACTIONS_KEY }}
      # Use a token from the GH App so the created PR triggers downstream
      # workflows. Events created by the default GITHUB_TOKEN are intentionally
      # ignored by other workflow triggers to prevent infinite recursive runs.
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: Update pixi lockfile
          title: Update pixi lockfile
          body-path: diff.md
          branch: update/pixi-lock
          base: main
          delete-branch: true
          add-paths: |
            pixi.lock
            hydromt-core-sbom.json
