name: Post-release cleanup (manual escape hatch)

# Release branches are NEVER merged back into `main` under the current model.
# `main`'s version is advanced to the next dev cycle by
# `create-release-branch.yml` at branch-cut time.
#
# This workflow is kept as a manual escape hatch only (e.g. if the
# create-release-branch run failed partway through and main was not bumped).
# It opens a PR against `main` that:
#   - resets the version in source to `X.(Y+1).0.dev0`
#   - inserts a fresh `Unreleased` section in the changelog

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash -l -e {0}

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup-pr:
    name: Open post-release cleanup PR
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Determine released version
        id: version
        run: |
          RELEASE_VERSION=$(bash .github/scripts/get-version.sh)
          if [ -z "$RELEASE_VERSION" ]; then
            echo "Could not determine release version from source."
            exit 1
          fi
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"

      - name: Create cleanup branch
        id: branch
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.RELEASE_VERSION }}
        run: |
          BRANCH="post-v$RELEASE_VERSION-release"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null; then
            BRANCH="${BRANCH}-$(date +%s)"
          fi
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Compute next dev version
        id: next
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.RELEASE_VERSION }}
        run: |
          # Always bump the MINOR version on main. Rationale: releases never
          # come from main (only from `release/vX.Y` branches), so main's
          # version just needs to be strictly greater than the most recent
          # release in its release family. Bumping the minor opens a fresh
          # next family on main and leaves room on the just-released family
          # for further patches without colliding with main's version.
          NEXT_VERSION=$(echo "$RELEASE_VERSION" \
            | awk -F. '{printf "%d.%d.0", $1, $2 + 1}')
          echo "NEXT_VERSION=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
      - name: Bump version to dev0 and add Unreleased changelog section
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.RELEASE_VERSION }}
          NEXT_VERSION: ${{ steps.next.outputs.NEXT_VERSION }}
        run: |
          sed -i "s/v$RELEASE_VERSION/Unreleased\n==========\n\nNew\n---\n\nChanged\n-------\n\nFixed\n-----\n\nDeprecated\n----------\n\nRemoved\n-------\n\nv$RELEASE_VERSION/" docs/changelog.rst
          bash .github/scripts/set-version.sh "${NEXT_VERSION}.dev0"

          git add docs/changelog.rst hydromt/__init__.py
          git commit -m "Post-release cleanup for v$RELEASE_VERSION"

      - name: Push and open PR
        env:
          BRANCH: ${{ steps.branch.outputs.BRANCH }}
          RELEASE_VERSION: ${{ steps.version.outputs.RELEASE_VERSION }}
          NEXT_VERSION: ${{ steps.next.outputs.NEXT_VERSION }}
        run: |
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Post-release cleanup for v$RELEASE_VERSION" \
            --body "Resets the version in source to \`${NEXT_VERSION}.dev0\` and adds a fresh \`Unreleased\` section to the changelog.

          > [!NOTE]
          > **Squash-merge this PR.** It only contains housekeeping commits; squashing keeps \`main\`'s history tidy. (Unlike the release PR, there's no tag pointing at these commits.)"
