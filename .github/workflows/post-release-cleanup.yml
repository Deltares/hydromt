name: Post-release cleanup

# Triggered when a release PR (from a `release/**` branch) is merged into
# `main`. Opens a follow-up PR that:
#   - resets the version in source to `X.Y.Z.dev0`
#   - inserts a fresh `Unreleased` section in the changelog
#
# Can also be run manually via workflow_dispatch.

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    shell: bash -l -e {0}

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup-pr:
    name: Open post-release cleanup PR
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Determine released version
        id: version
        run: |
          RELEASE_VERSION=$(bash .github/scripts/get-version.sh)
          if [ -z "$RELEASE_VERSION" ]; then
            echo "Could not determine release version from source."
            exit 1
          fi
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"

      - name: Create cleanup branch
        id: branch
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.RELEASE_VERSION }}
        run: |
          BRANCH="post-v$RELEASE_VERSION-release"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null; then
            BRANCH="${BRANCH}-$(date +%s)"
          fi
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Bump version to dev0 and add Unreleased changelog section
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.RELEASE_VERSION }}
        run: |
          sed -i "s/v$RELEASE_VERSION/Unreleased\n==========\n\nNew\n---\n\nChanged\n-------\n\nFixed\n-----\n\nDeprecated\n----------\n\nRemoved\n-------\n\nv$RELEASE_VERSION/" docs/changelog.rst
          bash .github/scripts/set-version.sh "${RELEASE_VERSION}.dev0"

          git add docs/changelog.rst hydromt/__init__.py
          git commit -m "Post-release cleanup for v$RELEASE_VERSION"

      - name: Push and open PR
        env:
          BRANCH: ${{ steps.branch.outputs.BRANCH }}
          RELEASE_VERSION: ${{ steps.version.outputs.RELEASE_VERSION }}
        run: |
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Post-release cleanup for v$RELEASE_VERSION" \
            --body "Resets the version in source to \`${RELEASE_VERSION}.dev0\` and adds a fresh \`Unreleased\` section to the changelog."
