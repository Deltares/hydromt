---
name: Build and Publish to PyPI

on:
  release:
    types:
      - published
  workflow_call:
    secrets:
      PYPI_TOKEN:
        required: true
      PYPI_TEST_TOKEN:
        required: false
  workflow_dispatch:

defaults:
  run:
    shell: bash -e -l {0}

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install flit twine

      - name: Build artifacts
        run: |
          git clean -xdf
          git restore -SW .
          flit build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: releases
          path: dist

  test-built-dist:
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: releases
          path: dist

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Verify the built dist/wheel is valid
        run: |
          python -m pip install dist/hydromt*.whl
          hydromt --models

  upload-to-test-pypi:
    needs: test-built-dist
    if: ${{ inputs.test-pypi || (github.event_name == 'push') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: releases
          path: dist
      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_TEST_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          verbose: true
          skip-existing: true

  upload-to-pypi:
    needs: test-built-dist
    if: ${{ github.event_name == 'release' || github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: releases
          path: dist
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          verbose: true
          skip-existing: false
