name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main, release/**]
    paths:
      - tests/**/*
      - hydromt/**/*
      - data/**/*
      - pyproject.toml
      - pixi.lock
      - .github/workflows/tests.yml
  pull_request:
    branches: [main, release/**]
    paths:
      - tests/**/*
      - hydromt/**/*
      - data/**/*
      - pyproject.toml
      - pixi.lock
      - .github/workflows/tests.yml

defaults:
  run:
    shell: bash -e -l {0}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['312','313','314']
        dependencies: ['min', 'full', 'low']

    name: pytest ${{ matrix.dependencies }}-${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.dependencies }}-${{ matrix.python-version }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: "v0.59.0"
          environments: ${{ matrix.dependencies }}-py${{ matrix.python-version }}
      - name: Test
        run: |
          export NUMBA_DISABLE_JIT=1
          pixi run --locked -e ${{ matrix.dependencies }}-py${{ matrix.python-version }} test
