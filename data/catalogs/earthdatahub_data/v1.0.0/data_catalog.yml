# The DestinE Earth Data Hub datasets require an authentication token.
# Please follow the instructions at https://earthdatahub.destine.eu/getting-started#configuring-netrc to set up.

meta:
  version: v1.0.0
  name: earthdatahub_data
  hydromt_version: '>1.0a,<2'

era5_land:
  data_type: RasterDataset
  uri: "https://data.earthdatahub.destine.eu/era5/era5-land-daily-utc-v1.zarr"
  driver:
    name: raster_xarray
    filesystem:
      protocol: https
    options:
      decode_times: true
      storage_options:
        client_kwargs:
          trust_env: true
  metadata:
    category: meteo
    paper_doi: 10.1002/qj.3803
    paper_ref: Hersbach et al. (2019)
    url: https://earthdatahub.destine.eu/collections/era5/datasets/era5-land-daily
    notes: Produced by the Earth Data Hub team from ERA5-Land hourly data
    license: CC-BY-4.0
    extent:
      bbox:
        West: -0.125
        South: -90.125
        East: 359.875
        North: 90.125
      time_range:
        start: '1950-01-01'
        end: 'present'
    crs: 4326
  data_adapter:
    unit_mult:
      precip: 1000
      kin: 0.0000115741
      kout: 0.0000115741
      ssr: 0.0000115741
      press_msl: 0.01
    rename:
      d2m: temp_dew
      msl: press_msl
      ssrd: kin
      t2m: temp
      tp: precip
      u10: wind10_u
      v10: wind10_v
      valid_time: time
    unit_add:
      temp: -273.15
      temp_dew: -273.15

