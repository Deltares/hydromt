[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-arm64"]

[pypi-dependencies]
hydromt = { path = ".", editable = true }

[dependencies]
aiohttp = ">=3.10,<4"        # async http client
affine = ">=2.4"             # Spatial rasterers affine transformations (bbox pixel coalision)
bottleneck = ">=1.4"         # Spearmen rank computation
click = ">=8.2"              # CLI configuration
dask = ">=2024"              # lazy computing
flit-core = ">=3.4.0,<4"     # build backend for editable local package (flit)
fsspec = ">=2025"            # general file systems utilities
geopandas = ">=1.0"          # pandas but geo, wraps fiona and shapely
importlib_metadata = ">=8.0" # entrypoints backport
mercantile = ">=1.0"         # tile handling
netcdf4 = ">=1.7"            # netcfd IO
numba = ">=0.59.0"           # speed up computations (used in e.g. stats)
numpy = ">=2.0"              # pin necessary to ensure compatability with C headers
packaging = ">=25.0"         # compare versions of hydromt
pandas = ">=2.3,<4"          # Dataframes
pooch = ">=1.8"              # data fetching
pyarrow = ">=17.0"           # Apache Arrow bindings
pydantic = ">=2.11"          # Validation
pydantic-settings = ">=2.8"  # Settings Management
pyflwdir = ">=0.5.10"        # Height models and derivatives
pyogrio = ">=0.10"           # io for geopandas dataframes
pyproj = ">=3.7"             # projections for Coordinate reference systems
pystac = ">=1.11"            # STAC integration
pyyaml = ">=6.0.2"           # yaml interface (6.0.2 adds py3.13 wheels, older builds fail)
rasterio = ">=1.4"           # raster wrapper around gdal
requests = ">=2.32.2"        # donwload stuff
rioxarray = ">=0.18"         # wraps rasterio and xarray. Almost superceded by hydromt/raster.py
scipy = ">=1.14"             # scientific utilities
shapely = ">=2.1.2"          # geometry transforms
tenacity = ">=9.1"           # general-purpose retrying library
tomli = ">=2.0"              # parsing toml files
tomli-w = ">=1.0"            # writing toml files
universal_pathlib = ">=0.2"  # provides path compatability between different filesystems
xarray = ">=2025.06"         # ndim data arrays
xmltodict = ">=1.0"          # xml parser also used to read VRT
xugrid = ">=0.15.1"          # xarray wrapper for mesh processing
zarr = ">=3.1,<4"            # zarr

[feature.dev.dependencies]
flit = ">=3.10"             # needed to publish to pypi
pandas-stubs = ">=2.3"      # type hints for pandas
pre-commit = ">=4.0"        # linting
ruff = ">=0.15"             # linting
python-dotenv = ">=1.0"     # find and load .env file
twine = ">=6.0"             # needed to publish to pypi
types-openpyxl = ">=3.0"    # type hints for openpyxl
types-PyYAML = ">=6.0"      # type hints for pyyaml
types-Pillow = ">=10.0"     # type hints for pillow
types-requests = ">=2.32.2" # type hints for requests
types-xmltodict = ">=1.0"   # type hints for xmltodict

[feature.dev.pypi-dependencies]
mypy = ">=2" # static type checking

[feature.doc.dependencies]
autodoc-pydantic = ">=2.0"              # pydantic autodoc
nbsphinx = ">=0.9"                      # build notebooks in docs
sphinx-autosummary-accessors = ">=2025" # doc layout
sphinx = ">=8,<9"                       # build docs, v9 is not compatible with sphinx_autosummary_accessors: https://github.com/xarray-contrib/sphinx-autosummary-accessors/issues/165
sphinxcontrib-mermaid = ">=2.0"         # mermaid diagram rendering
sphinx-click = ">=6.0"                  # click integration
sphinx-design = ">=0.6"                 # doc layout
pydata-sphinx-theme = ">=0.17.0"        # theme
myst-parser = ">=5.0"                   # markdown support in Sphinx

[feature.doc.pypi-dependencies]
sbom4python = ">=0.12"                  # generate software bill of materials

[feature.test.dependencies]
pytest = ">=9.0.3"       # testing framework
pytest-cov = ">=6.0"     # test coverage
pytest-mock = ">=3.13"   # mocking
pytest-timeout = ">=2.4" # darn hanging tests

[feature.examples.dependencies]
cartopy = ">=0.23"   # plotting examples
jupyterlab = ">=4.3" # run examples in jupyter notebook
notebook = ">=7.4"   # jupyter integration

[feature.extra.dependencies]
matplotlib = ">=3.0" # plotting; required for slippy tiles
pyet = ">=1.3"       # calc evapotranspiration, quite well used, used in all wflow models but domain specific

[feature.vrt.dependencies]
gdal = ">=3.5.0" # vrt for caching of mosaic raster

[feature.io.dependencies]
azure-ai-ml = ">=1.22"    # AzureML datastore URI resolution
azure-identity = ">=1.16" # Azure credential chain (DefaultAzureCredential)
adlfs = ">=2024"          # Azure Data Lake / Blob Storage file system
gcsfs = ">=2023.12.1"     # google cloud file system
fastparquet = ">=2024"    # parquet IO
openpyxl = ">=3.1"        # excel IO
pillow = ">=11.0"         # image IO
s3fs = ">=2024"           # S3 file system

[feature.lowest-deps]
solve-strategy = "lowest-direct"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.py314.dependencies]
python = "3.14.*"

[feature.doc.tasks]
doctest = { cmd = [
	"sphinx-build",
	"-M",
	"doctest",
	"docs",
	"docs/_build",
	"-W",
] }
docs-build = { cmd = [
	"sphinx-build",
	"-M",
	"html",
	"docs",
	"docs/_build",
	"-W",
], depends-on = [
	"doctest",
] }
docs-build-notest = { cmd = [
	"sphinx-build",
	"-M",
	"html",
	"docs",
	"docs/_build",
] }
docs = { depends-on = ["docs-build"] } # alias
doc = { depends-on = ["docs-build"] } # alias
serve = { cmd = ["python", "-m", "http.server", "-d", "docs/_build/html"] }
generate-sbom = { cmd = [
	"sbom4python",
	"--module",
	"hydromt",
	"--output-file",
	"hydromt-core-sbom.json",
	"--sbom",
	"spdx",
	"--format",
	"json",
] }

[feature.test.tasks]
test = { cmd = ["pytest"] }
test-lf = { cmd = ["pytest", "--lf", "--tb=short"] }
test-err-warn = { cmd = ["pytest", "--tb=short", "-W", "error"] }
test-cov = { cmd = [
	"pytest",
	"--verbose",
	"--cov=hydromt",
	"--cov-report=xml",
	"--cov-branch",
] }

[feature.dev.tasks]
install = { depends-on = ["install-pre-commit"] }
install-pre-commit = "pre-commit install"
lint = { cmd = ["pre-commit", "run", "--all"] }
mypy = "mypy ."

pypi = { depends-on = [
	"pypi-git-clean",
	"pypi-git-restore",
	"pypi-flit-build",
	"pypi-twine",
] }
pypi-git-clean = { cmd = ["git", "clean", "-xdf"] }
pypi-git-restore = { cmd = ["git", "restore", "-SW", "."] }
pypi-flit-build = { cmd = ["flit", "build"] }
pypi-twine = { cmd = ["python", "-m", "twine", "check", "dist/*"] }

# clean
clean = { depends-on = [
	"clean-dist",
	"clean-docs-generated",
	"clean-docs-build",
	"clean-docs-examples",
] }
clean-dist = { cmd = ["rm", "-rf", "dist"] }
clean-docs-generated = { cmd = ["rm", "-rf", "docs/_generated"] }
clean-docs-build = { cmd = ["rm", "-rf", "docs/_build"] }
clean-docs-examples = { cmd = ["rm", "-rf", "docs/examples"] }

[environments]
default = { features = [
	"py314",
	"io",
	"vrt",
	"extra",
	"dev",
	"test",
	"doc",
	"examples",
], solve-group = "py314" }

binder = { features = [
	"py313",
	"io",
	"vrt",
	"extra",
	"examples",
], solve-group = "py313" } # cannot do 3.14 yet, cartopy does not provide wheels for 3.14 yet.

full-py314 = { features = [
	"py314",
	"io",
	"vrt",
	"extra",
	"dev",
	"test",
	"doc",
	"examples",
], solve-group = "py314" }
low-py314 = { features = [
	"lowest-deps",
	"py314",
	"io",
	"vrt",
	"extra",
	"dev",
	"test",
	"doc",
	"examples",
] }
min-py314 = { features = ["py314", "test"], solve-group = "py314" }
full-py313 = { features = [
	"py313",
	"io",
	"vrt",
	"extra",
	"dev",
	"test",
	"doc",
	"examples",
], solve-group = "py313" }
low-py313 = { features = [
	"lowest-deps",
	"py313",
	"io",
	"vrt",
	"extra",
	"dev",
	"test",
	"doc",
	"examples",
] }
min-py313 = { features = ["py313", "test"], solve-group = "py313" }

full-py312 = { features = [
	"py312",
	"io",
	"vrt",
	"extra",
	"dev",
	"test",
	"doc",
	"examples",
], solve-group = "py312" }
low-py312 = { features = [
	"lowest-deps",
	"py312",
	"io",
	"vrt",
	"extra",
	"dev",
	"test",
	"doc",
	"examples",
] }
min-py312 = { features = ["py312", "test"], solve-group = "py312" }
